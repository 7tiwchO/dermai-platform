version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dermai_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/dermai.db:/app/dermai.db
      - ./backend/static/uploads:/app/static/uploads
      - ./backend/model.tflite:/app/model.tflite
    environment:
      - DERMAI_SECRET_KEY=production-secret-key-change-me
      - DERMAI_DEBUG=false
      - DERMAI_CORS_ORIGINS=http://localhost:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dermai_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped
